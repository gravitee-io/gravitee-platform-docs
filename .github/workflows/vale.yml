name: Vale Linting
on:
  pull_request:
    paths:
      - 'docs/**.md'
      - 'docs/**.mdx'

permissions:
  contents: read
  pull-requests: write

jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@v2
        with:
          files: all
          reporter: github-pr-review
          filter_mode: added
        env:
          GITHUB_TOKEN: ${{ github.token }}
