# Version Sync Action
#
# Automatically syncs changes from docs/{product}/{current_version}/
# to docs/{product}/{next_version}/ when files change on main.
#
# To use: copy this file to the docs repo at .github/workflows/version-sync.yml
# and configure the product/version matrix below.

name: Version Sync

on:
  push:
    branches: [main]
    paths:
      # Add one entry per product/version you want to sync FROM.
      # This example syncs APIM 4.10 → 4.11.
      - 'docs/apim/4.10/**'
      # Add more as needed:
      # - 'docs/am/4.10/**'
      # - 'docs/gko/4.10/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Configure your sync pairs here
          - product: apim
            current: "4.10"
            next: "4.11"
          # - product: am
          #   current: "4.10"
          #   next: "4.11"
          # - product: gko
          #   current: "4.10"
          #   next: "4.11"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Get changed files
        id: changes
        run: |
          # Get files changed in this push (relative to docs/{product}/{version}/)
          PREFIX="docs/${{ matrix.product }}/${{ matrix.current }}/"
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- "$PREFIX" | sed "s|^$PREFIX||")
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            # Write to file for multi-line support
            echo "$CHANGED" > /tmp/changed_files.txt
          fi

      - name: Check next version exists
        if: steps.changes.outputs.skip == 'false'
        id: check
        run: |
          NEXT_DIR="docs/${{ matrix.product }}/${{ matrix.next }}"
          if [ -d "$NEXT_DIR" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Next version directory $NEXT_DIR does not exist. Skipping sync."
          fi

      - name: Set up Python
        if: steps.changes.outputs.skip == 'false' && steps.check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        if: steps.changes.outputs.skip == 'false' && steps.check.outputs.exists == 'true'
        run: |
          CHANGED_ARGS=$(cat /tmp/changed_files.txt | tr '\n' ' ')
          python .github/scripts/sync_versions.py \
            . \
            ${{ matrix.product }} \
            ${{ matrix.current }} \
            ${{ matrix.next }} \
            --changed-files $CHANGED_ARGS

      - name: Commit and push
        if: steps.changes.outputs.skip == 'false' && steps.check.outputs.exists == 'true'
        run: |
          git config user.name "version-sync-bot"
          git config user.email "version-sync-bot@noreply.github.com"
          NEXT_DIR="docs/${{ matrix.product }}/${{ matrix.next }}"
          git add "$NEXT_DIR"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[sync] ${{ matrix.product }}: ${{ matrix.current }} → ${{ matrix.next }}

            Auto-synced $(git diff --cached --stat | tail -1)"
            git push
          fi
