name: CSpell Spellcheck

on:
  pull_request:
    paths:
      - 'docs/**.md'
      - 'docs/**.mdx'

permissions:
  contents: read
  pull-requests: write

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cspell
        run: npm install

      - name: Run cspell on changed files
        run: |
          # Get list of changed markdown files in the PR
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'docs/**.md' 'docs/**.mdx')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No markdown files changed."
            exit 0
          fi

          echo "Checking files:"
          echo "$CHANGED_FILES"

          # Run cspell on changed files only
          echo "$CHANGED_FILES" | xargs npx cspell --no-progress --show-suggestions
