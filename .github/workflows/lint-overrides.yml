# Lint Overrides Action
#
# Blocks PRs that contain divergent version edits (e.g. editing 4.12 but not 4.11)
# unless those files are explicitly added to .version-overrides.
# This prevents the version-sync bot from silently destroying manual 4.12 work.

name: Lint Version Overrides

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/apim/4.12/**'
      - 'docs/am/4.12/**'
      - 'docs/gko/4.12/**'

jobs:
  lint:
    # Do not run on PRs generated by the sync bot
    if: ${{ !startsWith(github.head_ref, 'sync/') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: apim
            current: "4.11"
            next: "4.12"
          - product: am
            current: "4.11"
            next: "4.12"
          - product: gko
            current: "4.11"
            next: "4.12"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to run `git diff origin/main...HEAD`

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Overrides for ${{ matrix.product }}
        run: |
          python .github/scripts/lint_overrides.py \
            . \
            ${{ matrix.product }} \
            ${{ matrix.current }} \
            ${{ matrix.next }}
