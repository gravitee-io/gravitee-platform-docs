 # Where Vale looks for style rules (Microsoft/*.yml and docs/*.yml live here)
StylesPath = "vale/styles"

# Show all issues: suggestions, warnings, AND errors (options: suggestion, warning, error)
MinAlertLevel = suggestion

# Use the custom vocabulary at vale/styles/config/vocabularies/docs/
# This loads accept.txt (allowed words) and reject.txt (flagged words)
Vocab = docs

# Download and use Microsoft's style guide package (the Microsoft/*.yml rules)
Packages = Microsoft

# Skip content inside these HTML tags, but still check text around them
IgnoredScopes = code, tt, img, url, a, link, blockquote

# Completely ignore these HTML tags and everything inside them
SkippedScopes = script, style, pre, figure, code

# Tell Vale to treat .mdx files the same as .md files
[formats]
mdx = md

# Apply these settings to all .md and .mdx files
[*.{md,mdx}]

# Use both Microsoft style rules AND our custom "docs" rules for linting
BasedOnStyles = Microsoft, docs

# Treat /* ... */ as comment delimiters (for MDX/JSX comments)
CommentDelimiters = {/*, */}

# Disable rules that give too many false positives
Microsoft.Passive = NO
Microsoft.Acronyms = NO
Microsoft.Headings = NO
Microsoft.Parens = NO
Microsoft.Foreign = NO
Microsoft.GeneralURL = NO
Microsoft.Accessibility = NO
Microsoft.Contractions = NO

# Ignore code surrounded by backticks or plus sign, parameters defaults, URLs, and angle brackets.
TokenIgnores = (<\/?[A-Z].+>), (\x60[^\n\x60]+\x60), ([^\n]+=[^\n]*), (\+[^\n]+\+), (http[^\n]+\[)
BlockIgnores = (```[a-z]*[\s\S]*?\n```), (---[\s\S]*?\n---), (keywords: [\s\S]*?\n), (description: [\s\S]*?\n)
