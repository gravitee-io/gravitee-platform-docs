repos:
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3.11
        files: ^tools/.*\.py$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^tools/.*\.py$
  - repo: https://github.com/errata-ai/vale
    rev: v3.9.1
    hooks:
      - id: vale
        args: [--config=.vale.ini]
        files: \.(md|mdx)$
